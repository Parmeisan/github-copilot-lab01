<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="day-filter-bar" class="day-filter-bar">
          <label><input type="checkbox" class="day-filter-input" value="Monday" checked /> Monday</label>
          <label><input type="checkbox" class="day-filter-input" value="Tuesday" checked /> Tuesday</label>
          <label><input type="checkbox" class="day-filter-input" value="Wednesday" checked /> Wednesday</label>
          <label><input type="checkbox" class="day-filter-input" value="Thursday" checked /> Thursday</label>
          <label><input type="checkbox" class="day-filter-input" value="Friday" checked /> Friday</label>
        </div>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="actions-container">
        <h3>Activity Details</h3>
        <div id="actions-content">
          <p>Select an activity to get started</p>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
